<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Внутренняя панель управления Human and Capital."/>
<title>Панель управления — Human and Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --black:#0e0e0d;
    --black-soft:#171716;
    --white:#ffffff;
    --grey-50:#f6f5f3;
    --grey-100:#eceae6;
    --grey-300:#c9c6bf;
    --grey-500:#8a8780;
    --grey-700:#4a4844;
    --mustard:#c69a2e;
    --mustard-light:#e0bb56;
    --mustard-dim:#8a701f;
    --ff-display:'Unbounded',sans-serif;
    --ff-body:'Inter',system-ui,sans-serif;
    --container:1180px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--ff-body);
    background:var(--white);
    color:var(--black);
    line-height:1.6;
    overflow-x:hidden;
  }
  ::selection{background:var(--mustard);color:var(--black);}
  a{color:inherit;}
  img,svg{display:block;max-width:100%;}
  .container{max-width:var(--container);margin:0 auto;padding:0 32px;}

  /* ===== NAV ===== */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:200;
    height:76px;display:flex;align-items:center;justify-content:space-between;
    padding:0 32px;
    background:transparent;
    border-bottom:1px solid transparent;
    transition:border-color .3s, background .3s, backdrop-filter .3s;
  }
  nav.scrolled{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    border-bottom-color:var(--grey-100);
  }
  /* logo swap: white over hero, dark when scrolled */
  .logo-img{height:30px;width:auto;display:block;transition:opacity .3s;}
  .logo-img.logo-dark-v{position:absolute;opacity:0;}
  nav.scrolled .logo-img.logo-white-v{opacity:0;}
  nav.scrolled .logo-img.logo-dark-v{opacity:1;}
  .logo{
    display:flex;align-items:center;position:relative;
    text-decoration:none;
  }
  .nav-links{display:flex;align-items:center;gap:30px;list-style:none;}
  .nav-links a{
    text-decoration:none;font-size:14px;font-weight:500;color:rgba(255,255,255,0.85);
    position:relative;padding:4px 0;
    transition:color .25s, opacity .25s;
  }
  nav.scrolled .nav-links a{color:var(--black-soft);}
  .nav-links a::after{
    content:'';position:absolute;left:0;bottom:0;width:0;height:1.5px;background:var(--mustard);
    transition:width .25s;
  }
  .nav-links > li > a:hover{color:var(--mustard-light);}
  nav.scrolled .nav-links > li > a:hover{color:var(--mustard-dim);}
  .nav-links a:hover::after{width:100%;}
  .nav-cta{
    background:var(--black);color:var(--white)!important;
    padding:11px 22px;border-radius:8px;font-weight:600!important;
    transition:background .2s, transform .2s;
  }
  .nav-cta::after{display:none;}
  .nav-cta:hover{background:var(--mustard-dim);transform:translateY(-1px);}
  .nav-burger{display:none;background:none;border:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;}
  .nav-burger span{width:22px;height:2px;background:var(--white);transition:.3s;}
  nav.scrolled .nav-burger span{background:var(--black);}

  /* SERVICES DROPDOWN */
  .has-dropdown{position:relative;}
  .dropdown-trigger{display:inline-flex;align-items:center;gap:5px;}
  .dropdown-caret{width:13px;height:13px;transition:transform .25s;}
  .has-dropdown:hover .dropdown-caret{transform:rotate(180deg);}
  .dropdown-menu{
    position:absolute;top:calc(100% + 14px);left:50%;transform:translateX(-50%) translateY(-6px);
    background:var(--white);border:1px solid var(--grey-100);border-radius:11px;
    box-shadow:0 12px 32px rgba(0,0,0,0.14);
    list-style:none;padding:8px;min-width:190px;
    opacity:0;visibility:hidden;
    transition:opacity .22s, transform .22s, visibility .22s;
    z-index:60;
  }
  /* hover bridge so menu doesn't close in the gap */
  .dropdown-menu::before{content:'';position:absolute;top:-14px;left:0;right:0;height:14px;}
  .has-dropdown:hover .dropdown-menu,
  .has-dropdown:focus-within .dropdown-menu{
    opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);
  }
  .dropdown-menu li{width:100%;}
  .dropdown-menu li a{
    display:block;padding:11px 14px;border-radius:7px;font-size:14px;font-weight:500;
    color:var(--black-soft);text-decoration:none;transition:background .2s, color .2s;
  }
  .dropdown-menu li a::after{display:none;}
  .dropdown-menu li a:hover{background:var(--grey-50);color:var(--mustard-dim);}

  /* LANGUAGE SWITCHER */
  .lang-item{position:relative;}
  .lang-toggle{
    display:flex;align-items:center;gap:6px;
    background:none;border:1px solid rgba(255,255,255,0.3);border-radius:7px;
    padding:7px 12px;cursor:pointer;font-family:var(--ff-body);
    font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);
    transition:border-color .25s, color .25s, background .25s;
  }
  .lang-toggle svg{width:16px;height:16px;stroke:rgba(255,255,255,0.85);transition:stroke .25s;}
  nav.scrolled .lang-toggle{border-color:var(--grey-100);color:var(--black-soft);}
  nav.scrolled .lang-toggle svg{stroke:var(--black-soft);}
  .lang-toggle:hover{border-color:var(--mustard);color:var(--mustard-light);}
  .lang-toggle:hover svg{stroke:var(--mustard-light);}
  nav.scrolled .lang-toggle:hover{color:var(--mustard-dim);background:var(--grey-50);}
  nav.scrolled .lang-toggle:hover svg{stroke:var(--mustard-dim);}
  .lang-menu{
    position:absolute;top:calc(100% + 8px);right:0;
    background:var(--white);border:1px solid var(--grey-100);border-radius:9px;
    box-shadow:0 8px 24px rgba(0,0,0,0.12);
    list-style:none;padding:6px;min-width:84px;
    opacity:0;visibility:hidden;transform:translateY(-6px);
    transition:opacity .2s, transform .2s, visibility .2s;
    z-index:50;
  }
  .lang-menu.open{opacity:1;visibility:visible;transform:translateY(0);}
  .lang-menu li a{
    display:block;padding:8px 12px;border-radius:6px;font-size:13px;font-weight:500;
    color:var(--black-soft);text-decoration:none;transition:background .2s, color .2s;
  }
  .lang-menu li a::after{display:none;}
  .lang-menu li a:hover{background:var(--grey-50);color:var(--mustard-dim);}

  /* ===== HERO ===== */
  .hero{
    min-height:100vh;position:relative;
    background:var(--black);color:var(--white);
    padding:140px 32px 80px;
    display:flex;align-items:center;
    overflow:hidden;
  }
  .hero-grain{
    position:absolute;inset:0;opacity:.05;pointer-events:none;
    background-image:radial-gradient(circle, var(--white) 1px, transparent 1px);
    background-size:22px 22px;
  }
  /* animated shimmering gradient backdrop - visibly moving blobs */
  .hero-aurora{
    position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;
  }
  .hero-aurora::before,
  .hero-aurora::after{
    content:'';position:absolute;border-radius:50%;
    filter:blur(70px);opacity:0.9;
  }
  .hero-aurora::before{
    width:60vw;height:60vw;left:-10%;top:-20%;
    background:radial-gradient(circle, rgba(198,154,46,0.30), rgba(198,154,46,0.06) 55%, transparent 70%);
    animation:auroraMove1 16s ease-in-out infinite;
  }
  .hero-aurora::after{
    width:55vw;height:55vw;right:-15%;bottom:-25%;
    background:radial-gradient(circle, rgba(224,187,86,0.24), rgba(198,154,46,0.05) 55%, transparent 70%);
    animation:auroraMove2 20s ease-in-out infinite;
  }
  .aurora-blob{
    position:absolute;width:45vw;height:45vw;border-radius:50%;
    left:30%;top:20%;pointer-events:none;
    background:radial-gradient(circle, rgba(198,154,46,0.18), transparent 65%);
    filter:blur(60px);
    animation:auroraMove3 24s ease-in-out infinite;
  }
  @keyframes auroraMove1{
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(25vw,15vh) scale(1.15);}
    66%{transform:translate(10vw,-10vh) scale(0.95);}
  }
  @keyframes auroraMove2{
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(-20vw,-12vh) scale(1.1);}
    66%{transform:translate(-8vw,14vh) scale(0.9);}
  }
  @keyframes auroraMove3{
    0%,100%{transform:translate(0,0) scale(1);opacity:0.7;}
    50%{transform:translate(-18vw,12vh) scale(1.2);opacity:1;}
  }
  .hero-glow{
    position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;
  }
  .hero-glow.g1{width:480px;height:480px;background:radial-gradient(circle, rgba(198,154,46,0.22), transparent 70%);top:-160px;right:-120px;animation:floatGlow1 14s ease-in-out infinite;}
  .hero-glow.g2{width:380px;height:380px;background:radial-gradient(circle, rgba(198,154,46,0.10), transparent 70%);bottom:-140px;left:-100px;animation:floatGlow2 16s ease-in-out infinite;}
  @keyframes floatGlow1{0%,100%{transform:translate(0,0);}50%{transform:translate(-40px,40px);}}
  @keyframes floatGlow2{0%,100%{transform:translate(0,0);}50%{transform:translate(50px,-30px);}}

  .hero-inner{
    max-width:var(--container);margin:0 auto;width:100%;position:relative;z-index:2;
    text-align:left;
    display:grid;grid-template-columns:1.05fr 0.95fr;gap:48px;align-items:center;
  }
  .hero-sub{margin-left:0;margin-right:0;}
  .hero-actions{justify-content:flex-start;}
  .hero-stats{justify-content:flex-start;}
  .hero-visual{
    position:relative;display:flex;align-items:center;justify-content:center;
  }
  .lottie-hero{
    width:100%;max-width:520px;aspect-ratio:1/1;
    filter:drop-shadow(0 20px 60px rgba(0,0,0,0.3));
  }
  .hero-eyebrow{
    display:inline-flex;align-items:center;gap:8px;justify-content:flex-start;
    font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--mustard-light);margin-bottom:28px;
  }
  .hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--mustard);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .hero-title{
    font-family:var(--ff-display);font-weight:700;
    font-size:clamp(40px,5.6vw,72px);line-height:1.04;letter-spacing:-0.01em;
    margin-bottom:28px;
  }
  .hero-title .accent{color:var(--mustard);font-style:normal;}
  .hero-sub{
    font-size:18px;color:var(--grey-300);max-width:480px;line-height:1.65;margin-bottom:40px;
  }
  .hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:56px;}
  .btn{
    display:inline-flex;align-items:center;gap:9px;
    text-decoration:none;padding:15px 28px;border-radius:9px;
    font-weight:600;font-size:15px;border:1px solid transparent;
    transition:transform .2s, background .2s, border-color .2s, color .2s;
    cursor:pointer;font-family:var(--ff-body);
  }
  .btn:hover{transform:translateY(-2px);}
  .btn-mustard{background:var(--mustard);color:var(--black);}
  .btn-mustard:hover{background:var(--mustard-light);}
  .btn-ghost{border-color:rgba(255,255,255,0.25);color:var(--white);}
  .btn-ghost:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4);}
  .btn-dark{background:var(--black);color:var(--white);}
  .btn-dark:hover{background:var(--black-soft);}
  .btn svg{width:15px;height:15px;}

  .hero-stats{display:flex;gap:44px;flex-wrap:wrap;}
  .hstat-num{font-family:var(--ff-display);font-weight:700;font-size:32px;color:var(--white);line-height:1;}
  .hstat-num .mustard{color:var(--mustard);}
  .hstat-label{font-size:13px;color:var(--grey-500);margin-top:6px;}

  /* ===== MARQUEE ===== */
  .marquee-wrap{
    background:var(--grey-50);border-top:1px solid var(--grey-100);border-bottom:1px solid var(--grey-100);
    padding:28px 0;overflow:hidden;white-space:nowrap;position:relative;
  }
  .marquee-wrap--alt{
    background:var(--black);border-top-color:rgba(255,255,255,0.08);border-bottom-color:rgba(255,255,255,0.08);
    padding:22px 0;
  }
  .marquee-track{display:inline-flex;gap:64px;animation:scroll-left 32s linear infinite;}
  .marquee-track--reverse{animation:scroll-right 38s linear infinite;}
  @keyframes scroll-left{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @keyframes scroll-right{from{transform:translateX(-50%);}to{transform:translateX(0);}}
  .marquee-item{
    font-family:var(--ff-display);font-weight:600;font-size:18px;color:var(--grey-500);
    display:inline-flex;align-items:center;gap:10px;
  }
  .marquee-item .sep{color:var(--mustard);}
  .marquee-wrap--alt .marquee-item{font-size:15px;color:var(--grey-300);font-weight:500;}

  /* ===== SECTION GENERIC ===== */
  section{padding:110px 32px;}
  .sec-head{max-width:640px;margin-bottom:60px;}
  .sec-eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--mustard-dim);margin-bottom:18px;
  }
  .sec-eyebrow::before{content:'';width:18px;height:2px;background:var(--mustard);}
  .sec-title{
    font-family:var(--ff-display);font-weight:700;
    font-size:clamp(28px,3.6vw,46px);line-height:1.12;letter-spacing:-0.01em;color:var(--black);
  }
  .sec-lead{font-size:16px;color:var(--grey-700);margin-top:18px;line-height:1.7;}

  /* ===== SERVICES ===== */
  #services{background:var(--white);}
  .svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .svc-card{
    border:1px solid var(--grey-100);border-radius:16px;padding:38px 32px;
    position:relative;overflow:hidden;transition:border-color .3s, background .3s, transform .3s;
  }
  .svc-card:hover{border-color:var(--black);transform:translateY(-4px);}
  .svc-tag{
    display:inline-flex;font-family:var(--ff-display);font-weight:700;font-size:13px;
    color:var(--mustard-dim);letter-spacing:.06em;margin-bottom:24px;
  }
  .svc-icon{
    width:52px;height:52px;border-radius:12px;background:var(--black);
    display:flex;align-items:center;justify-content:center;margin-bottom:24px;
    transition:background .3s;
  }
  .svc-card:hover .svc-icon{background:var(--mustard);}
  .svc-icon svg{width:24px;height:24px;stroke:var(--mustard);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s;}
  .svc-card:hover .svc-icon svg{stroke:var(--black);}
  .svc-card h3{font-family:var(--ff-display);font-size:21px;font-weight:600;margin-bottom:12px;}
  .svc-card p{font-size:14.5px;color:var(--grey-700);line-height:1.7;margin-bottom:22px;}
  .svc-link{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--black);text-decoration:none;}
  .svc-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .25s;}
  .svc-card:hover .svc-link svg{transform:translateX(3px);}

  /* ===== ABOUT COMPANY ===== */
  #about-company{background:var(--white);}
  .ac-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:64px;align-items:center;}
  .ac-text p{font-size:16px;color:var(--grey-700);line-height:1.8;margin-bottom:18px;}
  .ac-text p:last-child{margin-bottom:0;}
  .ac-quote{color:var(--black);font-weight:600;font-style:italic;}
  .ac-media{position:relative;}
  .ac-img-frame{
    position:relative;border-radius:18px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,0.16);
  }
  .ac-img-frame::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(150deg, transparent 55%, rgba(198,154,46,0.18));
    pointer-events:none;
  }
  .ac-img-frame img{width:100%;height:480px;object-fit:cover;display:block;}
  .ac-badge{
    position:absolute;left:-26px;bottom:-26px;
    background:var(--black);color:var(--white);
    padding:22px 28px;border-radius:14px;
    box-shadow:0 16px 40px rgba(0,0,0,0.22);
    border:1px solid rgba(255,255,255,0.06);
  }
  .ac-badge-num{font-family:var(--ff-display);font-weight:700;font-size:30px;color:var(--mustard);line-height:1;}
  .ac-badge-label{font-size:13px;color:var(--grey-300);margin-top:6px;}

  /* ===== ROADMAP ===== */
  #roadmap{background:var(--grey-50);}
  .rm-timeline{position:relative;margin-top:56px;padding-left:64px;}
  .rm-line{
    position:absolute;left:23px;top:6px;bottom:6px;width:2px;
    background:var(--grey-300);
    overflow:hidden;
  }
  .rm-line::after{
    content:'';position:absolute;left:0;top:0;width:100%;height:0%;
    background:var(--mustard);
    transition:height 1.6s cubic-bezier(.4,0,.2,1);
  }
  .rm-line.fill::after{height:100%;}
  .rm-item{position:relative;padding-bottom:46px;}
  .rm-item:last-child{padding-bottom:0;}
  .rm-num{
    position:absolute;left:-64px;top:-2px;width:48px;height:48px;border-radius:50%;
    background:var(--white);border:2px solid var(--grey-300);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--ff-display);font-weight:700;font-size:14px;color:var(--grey-500);
    transition:border-color .4s, color .4s, background .4s, transform .4s;
    z-index:1;
  }
  .rm-item.active .rm-num{border-color:var(--mustard);color:var(--black);background:var(--mustard);transform:scale(1.12);box-shadow:0 4px 16px rgba(198,154,46,0.4);}
  .rm-body h4{font-family:var(--ff-display);font-size:17px;font-weight:600;margin-bottom:8px;color:var(--black);transition:color .4s;}
  .rm-item.active .rm-body h4{color:var(--mustard-dim);}
  .rm-body p{font-size:14.5px;color:var(--grey-700);line-height:1.65;max-width:520px;}

  /* ===== WHY US ===== */
  #why{background:var(--white);}
  .why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .why-card{padding:30px 26px;border:1px solid var(--grey-100);border-radius:14px;transition:border-color .3s, transform .3s;}
  .why-card:hover{border-color:var(--mustard);transform:translateY(-3px);}
  .why-icon{
    width:46px;height:46px;border-radius:11px;background:var(--black);
    display:flex;align-items:center;justify-content:center;margin-bottom:20px;
    transition:background .3s;
  }
  .why-card:hover .why-icon{background:var(--mustard);}
  .why-icon svg{width:22px;height:22px;stroke:var(--mustard);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s;}
  .why-card:hover .why-icon svg{stroke:var(--black);}
  .why-card h4{font-size:16.5px;font-weight:600;margin-bottom:9px;font-family:var(--ff-display);}
  .why-card p{font-size:14px;color:var(--grey-700);line-height:1.65;}

  /* ===== REVIEWS ===== */
  #reviews{background:var(--grey-50);}
  .rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .rev-card{
    background:var(--white);border:1px solid var(--grey-100);border-radius:14px;padding:30px 28px;
    display:flex;flex-direction:column;transition:border-color .3s, transform .3s;
  }
  .rev-card:hover{border-color:var(--mustard);transform:translateY(-3px);}
  .rev-quote{font-family:var(--ff-display);font-size:38px;color:var(--mustard);line-height:1;margin-bottom:12px;}
  .rev-text{font-size:13.5px;color:var(--grey-700);line-height:1.7;margin-bottom:22px;flex-grow:1;}
  .rev-author{display:flex;align-items:center;gap:12px;border-top:1px solid var(--grey-100);padding-top:18px;}
  .rev-avatar{
    width:38px;height:38px;border-radius:50%;background:var(--black);color:var(--mustard);
    display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);
    font-weight:700;font-size:13px;flex-shrink:0;
  }
  .rev-name{font-size:13.5px;font-weight:600;color:var(--black);}
  .rev-role{font-size:12px;color:var(--grey-500);margin-top:2px;}

  /* ===== TEAM ===== */
  #team{background:var(--grey-50);}
  .team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;}
  .team-grid--founders{
    grid-template-columns:repeat(2, minmax(0,280px));
    justify-content:center;gap:28px;
  }
  .team-card{text-align:center;background:var(--white);border:1px solid var(--grey-100);border-radius:14px;padding:28px 14px;transition:transform .25s, border-color .25s;}
  .team-card:hover{transform:translateY(-4px);border-color:var(--mustard);}
  .team-grid--founders .team-card{padding:40px 28px;}
  .team-avatar{
    width:64px;height:64px;border-radius:50%;background:var(--black);color:var(--mustard);
    display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);
    font-weight:700;font-size:19px;margin:0 auto 14px;
  }
  .team-avatar--photo{background:var(--grey-100);overflow:hidden;padding:0;}
  .team-avatar--photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .team-grid--founders .team-avatar{width:84px;height:84px;font-size:26px;margin-bottom:18px;}
  .team-grid--founders .team-avatar--photo{width:128px;height:128px;border:3px solid var(--white);box-shadow:0 8px 24px rgba(0,0,0,0.12);}
  .team-card h4{font-size:14px;font-weight:600;margin-bottom:4px;}
  .team-grid--founders .team-card h4{font-size:18px;font-family:var(--ff-display);margin-bottom:6px;}
  .team-card p{font-size:11.5px;color:var(--grey-500);line-height:1.4;}
  .team-grid--founders .team-card p{font-size:13.5px;}

  /* ===== CONTACT ===== */
  #contact{background:var(--black);color:var(--white);}
  .ct-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
  #contact .sec-eyebrow{color:var(--mustard-light);}
  #contact .sec-title{color:var(--white);}
  .ct-info p.sec-lead{color:var(--grey-300);}
  .ct-items{display:flex;flex-direction:column;gap:16px;margin-top:36px;}
  .ct-item{
    display:flex;align-items:center;gap:14px;font-size:15px;color:var(--grey-300);
    text-decoration:none;transition:color .2s;
  }
  .ct-item:hover{color:var(--white);}
  .ct-icon{
    width:40px;height:40px;border-radius:9px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .ct-icon svg{width:17px;height:17px;stroke:var(--mustard);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
  .social-row{display:flex;gap:12px;margin-top:32px;}
  .social-link{
    width:42px;height:42px;border-radius:9px;border:1px solid rgba(255,255,255,0.12);
    display:flex;align-items:center;justify-content:center;transition:border-color .2s, background .2s;
  }
  .social-link:hover{border-color:var(--mustard);background:rgba(198,154,46,0.08);}
  .social-link svg{width:17px;height:17px;}

  .ct-form{display:flex;flex-direction:column;gap:16px;}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .fgroup{display:flex;flex-direction:column;gap:7px;}
  .fgroup label{font-size:13px;font-weight:500;color:var(--grey-300);}
  .fgroup input,.fgroup textarea,.fgroup select{
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.14);border-radius:9px;
    padding:13px 15px;font-family:var(--ff-body);font-size:15px;color:var(--white);outline:none;
    transition:border-color .2s, background .2s;width:100%;
  }
  .fgroup input::placeholder,.fgroup textarea::placeholder{color:var(--grey-500);}
  .fgroup input:focus,.fgroup textarea:focus,.fgroup select:focus{border-color:var(--mustard);background:rgba(255,255,255,0.08);}
  .fgroup textarea{resize:vertical;min-height:96px;}
  .fgroup select option{background:var(--black-soft);}
  .btn-submit{
    background:var(--mustard);color:var(--black);border:none;border-radius:9px;
    padding:15px 28px;font-family:var(--ff-body);font-size:15px;font-weight:700;cursor:pointer;
    transition:background .2s, transform .2s;align-self:flex-start;
  }
  .btn-submit:hover{background:var(--mustard-light);transform:translateY(-2px);}

  /* ===== FOOTER ===== */
  footer{
    background:var(--black-soft);color:var(--grey-500);padding:32px 32px;
    display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .footer-logo{font-family:var(--ff-display);font-weight:700;font-size:15px;color:var(--white);text-decoration:none;}
  footer p{font-size:13px;}
  .footer-links{display:flex;gap:24px;}
  .footer-links a{font-size:13px;color:var(--grey-500);text-decoration:none;transition:color .2s;}
  .footer-links a:hover{color:var(--mustard-light);}

  /* ===== FLOATING CONTACT WIDGET ===== */
  .fab-wrap{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
  .fab-btn{
    display:inline-flex;align-items:center;gap:10px;background:var(--mustard);color:var(--black);
    border:none;border-radius:50px;padding:15px 22px;font-family:var(--ff-body);font-weight:600;font-size:14.5px;
    cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.25);transition:background .2s, transform .2s;
    animation:glowPulse 2.4s ease-in-out infinite;
  }
  .fab-btn:hover{background:var(--mustard-light);transform:translateY(-2px);}
  .fab-btn svg{width:19px;height:19px;flex-shrink:0;}
  .fab-icon-close{display:none;}
  .fab-wrap.open .fab-icon-open{display:none;}
  .fab-wrap.open .fab-icon-close{display:block;}
  .fab-menu{
    display:flex;flex-direction:column;align-items:flex-end;gap:10px;
    max-height:0;overflow:hidden;transition:max-height .35s ease;
  }
  .fab-wrap.open .fab-menu{max-height:340px;}
  .fab-item{
    width:46px;height:46px;border-radius:50%;background:var(--black);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 22px rgba(0,0,0,0.25);
    opacity:0;transform:translateX(10px);
    transition:opacity .3s ease, transform .3s ease, background .25s ease;
  }
  .fab-item svg{width:21px;height:21px;stroke:var(--mustard);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .25s ease;}
  .fab-item:hover{background:var(--mustard);transform:translateX(-4px);}
  .fab-item:hover svg{stroke:var(--black);}
  .fab-wrap.open .fab-item{opacity:1;transform:translateX(0);}
  .fab-wrap.open .fab-item:nth-child(1){transition-delay:.2s;}
  .fab-wrap.open .fab-item:nth-child(2){transition-delay:.15s;}
  .fab-wrap.open .fab-item:nth-child(3){transition-delay:.1s;}
  .fab-wrap.open .fab-item:nth-child(4){transition-delay:.05s;}
  .fab-wrap.open .fab-item:nth-child(5){transition-delay:0s;}
  @media (max-width:480px){
    .fab-wrap{bottom:18px;right:18px;}
    .fab-btn span{display:none;}
    .fab-btn{padding:15px;border-radius:50%;}
  }

  /* ===== TOAST ===== */
  .toast{
    position:fixed;bottom:104px;right:24px;background:var(--mustard);color:var(--black);
    padding:15px 26px;border-radius:9px;font-size:14px;font-weight:600;
    transform:translateY(80px);opacity:0;transition:.3s;z-index:999;
  }
  .toast.show{transform:translateY(0);opacity:1;}

  /* ===== REVEAL ANIM ===== */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease, transform .7s ease;}
  .reveal.in{opacity:1;transform:translateY(0);}

  /* ===== RESPONSIVE ===== */
  @media (max-width:1080px){
    .nav-links{display:none;}
    .nav-burger{display:flex;}
    .nav-links.open{
      display:flex;flex-direction:column;gap:0;position:fixed;top:76px;left:0;right:0;
      background:var(--white);border-bottom:1px solid var(--grey-100);padding:10px 0;z-index:150;
    }
    .nav-links.open li{width:100%;}
    .nav-links.open a{display:block;padding:14px 28px;color:var(--black-soft);}
    .nav-links.open .lang-toggle{margin:8px 28px;border-color:var(--grey-100);color:var(--black-soft);}
    .nav-links.open .lang-toggle svg{stroke:var(--black-soft);}
    .nav-links.open .nav-cta{margin:8px 28px;text-align:center;}
    /* dropdown as accordion on mobile */
    .nav-links.open .dropdown-menu{
      position:static;transform:none;opacity:1;visibility:visible;
      box-shadow:none;border:none;border-radius:0;background:var(--grey-50);
      padding:0;min-width:auto;max-height:0;overflow:hidden;
      transition:max-height .3s ease;
    }
    .nav-links.open .has-dropdown.open-sub .dropdown-menu{max-height:200px;}
    .nav-links.open .dropdown-menu li a{padding:12px 44px;font-size:13.5px;}
    .nav-links.open .has-dropdown.open-sub .dropdown-caret{transform:rotate(180deg);}
    .dropdown-menu::before{display:none;}
    .svc-grid,.why-grid,.rev-grid{grid-template-columns:1fr 1fr;}
    .hero-inner{grid-template-columns:1fr;gap:32px;text-align:center;}
    .hero-eyebrow{justify-content:center;}
    .hero-sub{margin-left:auto;margin-right:auto;}
    .hero-actions{justify-content:center;}
    .hero-stats{justify-content:center;}
    .hero-visual{order:-1;}
    .lottie-hero{max-width:340px;}
    .rm-timeline{padding-left:54px;}
    .rm-line{left:19px;}
    .rm-num{left:-54px;width:40px;height:40px;font-size:13px;}
    .team-grid{grid-template-columns:repeat(3,1fr);}
    .ct-grid{grid-template-columns:1fr;gap:50px;}
    .ac-grid{grid-template-columns:1fr;gap:24px;}
  }
  @media (max-width:640px){
    section{padding:72px 20px;}
    .hero{padding:120px 20px 60px;}
    nav{padding:0 20px;}
    .svc-grid,.why-grid,.rev-grid{grid-template-columns:1fr;}
    .team-grid{grid-template-columns:1fr 1fr;}
    .team-grid--founders{grid-template-columns:1fr;}
    .frow{grid-template-columns:1fr;}
    .hero-stats{gap:28px;}
    .lottie-hero{max-width:260px;}
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{transition:none!important;animation:none!important;}
  }

  /* ===== RECRUITMENT PAGE ===== */
  .rec-hero{
    min-height:88vh;position:relative;background:var(--black);color:var(--white);
    padding:160px 32px 90px;display:flex;align-items:center;overflow:hidden;
  }
  .rec-hero-inner{
    max-width:var(--container);margin:0 auto;width:100%;position:relative;z-index:2;
    display:grid;grid-template-columns:1.05fr 0.95fr;gap:48px;align-items:center;
  }
  .rec-hero-text{text-align:left;}
  .rec-hero h1{font-family:var(--ff-display);font-weight:700;font-size:clamp(40px,5.6vw,72px);line-height:1.05;letter-spacing:-0.01em;margin-bottom:26px;}
  .rec-hero h1 .accent{color:var(--mustard);}
  .rec-hero p.lead{font-size:19px;color:var(--grey-300);line-height:1.7;max-width:560px;margin-bottom:42px;}
  .rec-hero .hero-actions{justify-content:flex-start;}
  .rec-hero-visual{display:flex;align-items:center;justify-content:center;}
  .rec-hero-lottie{width:100%;max-width:480px;aspect-ratio:1/1;filter:drop-shadow(0 20px 50px rgba(0,0,0,0.35));}
  @media (max-width:1080px){
    .rec-hero-inner{grid-template-columns:1fr;gap:28px;}
    .rec-hero-visual{order:-1;}
    .rec-hero-lottie{max-width:300px;margin:0 auto;}
  }

  /* AUTOMATION — ORBIT LAYOUT */
  #rec-automation{background:var(--grey-50);}
  .orbit-wrap{position:relative;width:min(720px,92vw);height:min(720px,92vw);margin:56px auto 0;}
  .orbit-center{
    position:absolute;top:50%;left:50%;width:30%;height:30%;transform:translate(-50%,-50%);
    border-radius:50%;background:radial-gradient(circle at 32% 28%, var(--mustard-light), var(--mustard) 60%, var(--mustard-dim) 100%);
    display:flex;align-items:center;justify-content:center;text-align:center;padding:6%;
    box-shadow:0 18px 50px rgba(198,154,46,0.35), 0 0 0 10px rgba(198,154,46,0.08);
    z-index:3;
  }
  .orbit-center span{font-family:var(--ff-display);font-weight:700;font-size:clamp(13px,1.7vw,17px);color:var(--black);line-height:1.28;}
  .orbit-node{
    position:absolute;width:30%;transform:translate(-50%,-50%);
    background:var(--white);border:1px solid var(--grey-100);border-radius:16px;
    padding:16px 14px;text-align:center;z-index:2;
    transition:border-color .3s, transform .3s, box-shadow .3s;
  }
  .orbit-node:hover{border-color:var(--mustard);box-shadow:0 16px 36px rgba(0,0,0,0.1);z-index:4;}
  .orbit-node-icon{
    width:38px;height:38px;border-radius:10px;background:var(--black);
    display:flex;align-items:center;justify-content:center;margin:0 auto 10px;transition:background .3s;
  }
  .orbit-node:hover .orbit-node-icon{background:var(--mustard);}
  .orbit-node-icon svg{width:18px;height:18px;stroke:var(--mustard);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s;}
  .orbit-node:hover .orbit-node-icon svg{stroke:var(--black);}
  .orbit-node h4{font-family:var(--ff-display);font-size:13.5px;font-weight:600;margin-bottom:6px;}
  .orbit-node p{font-size:11.5px;color:var(--grey-700);line-height:1.45;}
  .orbit-node--1{top:17%;left:50%;}
  .orbit-node--2{top:39.8%;left:81.4%;}
  .orbit-node--3{top:76.7%;left:69.4%;}
  .orbit-node--4{top:76.7%;left:30.6%;}
  .orbit-node--5{top:39.8%;left:18.6%;}
  .orbit-wrap .reveal:nth-child(1){transition-delay:0s;}
  .orbit-wrap .reveal:nth-child(2){transition-delay:.08s;}
  .orbit-wrap .reveal:nth-child(3){transition-delay:.16s;}
  .orbit-wrap .reveal:nth-child(4){transition-delay:.24s;}
  .orbit-wrap .reveal:nth-child(5){transition-delay:.32s;}
  .orbit-wrap .reveal:nth-child(6){transition-delay:.4s;}
  @media (max-width:900px){
    .orbit-wrap{width:100%;max-width:480px;height:auto;display:flex;flex-direction:column;gap:16px;margin-top:36px;}
    .orbit-center{position:static;width:100%;max-width:220px;height:auto;aspect-ratio:1/1;margin:0 auto 8px;transform:none;}
    .orbit-node{position:static;width:100%;transform:none;}
  }

  #rec-detail{background:var(--white);}
  .rec-cards{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;}
  .rec-card{
    border:1px solid var(--grey-100);border-radius:16px;padding:38px 34px;position:relative;overflow:hidden;
    transition:border-color .3s, transform .3s;
  }
  .rec-card:hover{border-color:var(--mustard);transform:translateY(-3px);}
  .rec-card-icon{
    width:52px;height:52px;border-radius:13px;background:var(--black);
    display:flex;align-items:center;justify-content:center;margin-bottom:22px;transition:background .3s;
  }
  .rec-card:hover .rec-card-icon{background:var(--mustard);}
  .rec-card-icon svg{width:24px;height:24px;stroke:var(--mustard);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s;}
  .rec-card:hover .rec-card-icon svg{stroke:var(--black);}
  .rec-card h3{font-family:var(--ff-display);font-size:21px;font-weight:600;margin-bottom:14px;}
  .rec-price-figure{font-family:var(--ff-display);font-weight:700;font-size:clamp(30px,4vw,44px);color:var(--mustard-dim);line-height:1.1;margin-bottom:10px;}
  .rec-card p{font-size:15px;color:var(--grey-700);line-height:1.7;}

  .rec-guarantees{
    background:var(--black);color:var(--white);border-radius:18px;padding:48px 44px;margin-top:24px;
    position:relative;overflow:hidden;
  }
  .rec-guarantees::before{
    content:'';position:absolute;width:360px;height:360px;border-radius:50%;
    background:radial-gradient(circle,rgba(198,154,46,0.16),transparent 70%);top:-120px;right:-100px;pointer-events:none;
  }
  .rec-guarantees h3{font-family:var(--ff-display);font-size:26px;font-weight:700;margin-bottom:8px;position:relative;}
  .rec-guarantees .rg-sub{color:var(--grey-500);font-size:15px;margin-bottom:32px;position:relative;}
  .rg-list{display:grid;grid-template-columns:1fr 1fr;gap:18px;position:relative;}
  .rg-item{
    display:flex;gap:14px;align-items:flex-start;border-radius:13px;
    padding:13px 14px;margin:-13px -14px;cursor:default;
    transition:background .3s ease, transform .3s ease;
  }
  .rg-item:hover{background:rgba(198,154,46,0.09);transform:translateX(5px);}
  .rg-check{
    width:30px;height:30px;border-radius:8px;background:rgba(198,154,46,0.15);border:1px solid rgba(198,154,46,0.3);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
    transition:background .35s ease, border-color .35s ease, box-shadow .35s ease, transform .35s ease;
  }
  .rg-item:hover .rg-check{
    background:var(--mustard);border-color:var(--mustard);
    box-shadow:0 0 0 6px rgba(198,154,46,0.18), 0 0 22px rgba(198,154,46,0.55);
    transform:scale(1.1);
  }
  .rg-check svg{width:15px;height:15px;stroke:var(--mustard);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s ease;}
  .rg-item:hover .rg-check svg{stroke:var(--black);}
  .rg-item h4{font-size:15px;font-weight:600;margin-bottom:5px;color:var(--white);transition:color .3s ease;}
  .rg-item:hover h4{color:var(--mustard-light);}
  .rg-item p{font-size:13.5px;color:var(--grey-300);line-height:1.6;transition:color .3s ease;}
  .rg-item:hover p{color:var(--grey-100);}

  /* GLOWING BUTTON */
  .btn-glow{
    display:inline-flex;align-items:center;gap:9px;margin-top:28px;
    background:var(--mustard);color:var(--black);text-decoration:none;
    padding:15px 28px;border-radius:9px;font-weight:600;font-size:15px;
    position:relative;transition:background .2s, transform .2s;
    animation:glowPulse 2.4s ease-in-out infinite;
  }
  .btn-glow:hover{background:var(--mustard-light);transform:translateY(-2px);}
  .btn-glow svg{width:15px;height:15px;}
  @keyframes glowPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(198,154,46,0.5), 0 8px 22px rgba(198,154,46,0.3);}
    50%{box-shadow:0 0 0 14px rgba(198,154,46,0), 0 8px 30px rgba(198,154,46,0.55);}
  }
  @media (prefers-reduced-motion: reduce){.btn-glow{animation:none;}}

  /* BANK OF RESUMES */
  #rec-bank{background:var(--grey-50);}
  .bank-section-grid{display:flex;align-items:center;justify-content:space-between;gap:48px;}
  .bank-section-grid .sec-head{margin-bottom:0;max-width:480px;}
  .bank-combo-wrap{display:flex;justify-content:center;flex-shrink:0;margin-top:0;}
  .bank-combo{width:380px;max-width:380px;padding:38px 34px;}
  @media (max-width:900px){
    .bank-section-grid{flex-direction:column;align-items:stretch;}
    .bank-section-grid .sec-head{max-width:none;margin-bottom:8px;}
    .bank-combo-wrap{justify-content:center;}
  }

  @media (max-width:820px){
    .rec-cards{grid-template-columns:1fr;}
    .rg-list{grid-template-columns:1fr;}
    .rec-guarantees{padding:36px 26px;}
  }


  /* ===== ADMIN PANEL ===== */
  body.adm{background:var(--grey-50);}
  .adm-hide{display:none !important;}

  /* login */
  .adm-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(720px 380px at 20% -10%,rgba(198,154,46,.18),transparent 70%),var(--black);}
  .adm-login-card{width:min(420px,100%);background:var(--white);border-radius:24px;padding:40px 36px;box-shadow:0 40px 90px rgba(0,0,0,.4);}
  .adm-login-card img{height:30px;margin-bottom:26px;}
  .adm-login-card h1{font-family:var(--ff-display);font-weight:700;font-size:24px;color:var(--black);margin-bottom:6px;}
  .adm-login-card .sub{font-size:13.5px;color:var(--grey-700);margin-bottom:24px;}
  .adm-fg{margin-bottom:15px;}
  .adm-fg label{display:block;font-size:13px;color:var(--grey-700);margin-bottom:7px;font-weight:500;}
  .adm-fg input,.adm-fg select{width:100%;padding:13px 15px;border-radius:11px;border:1px solid var(--grey-100);background:var(--grey-50);font-family:var(--ff-body);font-size:14px;color:var(--black);transition:border-color .25s ease, background .25s ease;}
  .adm-fg input:focus,.adm-fg select:focus{outline:none;border-color:var(--mustard);background:var(--white);}
  .adm-cta{width:100%;height:48px;border:none;border-radius:12px;background:var(--black);color:#fff;font-family:var(--ff-body);font-weight:700;font-size:15px;cursor:pointer;transition:background .25s ease;}
  .adm-cta:hover{background:var(--mustard);color:var(--black);}
  .adm-hint{margin-top:18px;font-size:12px;line-height:1.5;color:var(--grey-500);background:var(--grey-50);border:1px solid var(--grey-100);border-radius:10px;padding:11px 13px;}
  .adm-hint b{color:var(--black);}
  .adm-err{color:#c0392b;font-size:13px;margin-top:10px;display:none;}

  /* shell */
  .adm-shell{display:none;min-height:100vh;grid-template-columns:248px 1fr;}
  body.authed .adm-shell{display:grid;}
  body.authed .adm-login{display:none;}
  .adm-side{background:var(--black);padding:22px 16px;display:flex;flex-direction:column;gap:6px;min-height:100vh;}
  .adm-side .logo-img{height:26px;margin:6px 8px 20px;}
  .adm-nav{display:flex;flex-direction:column;gap:3px;}
  .adm-nav button{display:flex;align-items:center;gap:12px;width:100%;max-width:100%;text-align:left;background:none;border:none;color:var(--grey-300);font-family:var(--ff-body);font-size:14px;padding:11px 14px;border-radius:11px;cursor:pointer;transition:background-color .15s ease,color .15s ease;}
  .adm-nav button svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  .adm-nav button:hover{background:rgba(255,255,255,.06);color:#fff;}
  .adm-nav button.active{background:var(--mustard);color:var(--black);font-weight:600;}
  .adm-user{border-top:1px solid rgba(255,255,255,.1);padding-top:14px;margin-top:auto;}
  .adm-user .who{display:flex;align-items:center;gap:11px;padding:6px 8px;}
  .adm-avatar{width:36px;height:36px;border-radius:50%;background:var(--mustard);color:var(--black);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .adm-user .nm{font-size:13.5px;color:#fff;line-height:1.3;}
  .adm-user .rl{font-size:11px;color:var(--mustard-light);}
  .adm-logout{margin-top:8px;width:100%;background:none;border:1px solid rgba(255,255,255,.14);color:var(--grey-300);border-radius:10px;padding:9px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s ease;}
  .adm-logout svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .adm-logout:hover{border-color:var(--mustard);color:#fff;}

  .adm-main{padding:30px 34px 60px;overflow-x:hidden;}
  .adm-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:26px;}
  .adm-head h2{font-family:var(--ff-display);font-weight:700;font-size:26px;color:var(--black);}
  .adm-head p{font-size:13.5px;color:var(--grey-700);margin-top:3px;}
  .adm-btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:11px;background:var(--black);color:#fff;font-family:var(--ff-body);font-weight:600;font-size:13.5px;padding:11px 18px;cursor:pointer;transition:background .25s ease;}
  .adm-btn:hover{background:var(--mustard);color:var(--black);}
  .adm-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
  .adm-btn-ghost{background:var(--white);border:1px solid var(--grey-100);color:var(--black);}
  .adm-btn-ghost:hover{background:var(--grey-50);border-color:var(--mustard);color:var(--black);}

  /* stat tiles */
  .adm-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:30px;}
  .adm-stat{background:var(--white);border:1px solid var(--grey-100);border-radius:16px;padding:20px;}
  .adm-stat .ic{width:40px;height:40px;border-radius:11px;background:rgba(198,154,46,.12);border:1px solid rgba(198,154,46,.3);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .adm-stat .ic svg{width:20px;height:20px;stroke:var(--mustard-dim);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  .adm-stat .num{font-family:var(--ff-display);font-weight:700;font-size:30px;color:var(--black);line-height:1;}
  .adm-stat .lbl{font-size:13px;color:var(--grey-700);margin-top:6px;}

  /* table */
  .adm-card{background:var(--white);border:1px solid var(--grey-100);border-radius:16px;overflow:hidden;}
  .adm-table-wrap{overflow-x:auto;}
  table.adm-table{width:100%;border-collapse:collapse;min-width:560px;}
  .adm-table th{text-align:left;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--grey-500);font-weight:600;padding:14px 18px;border-bottom:1px solid var(--grey-100);background:var(--grey-50);}
  .adm-table td{padding:14px 18px;border-bottom:1px solid var(--grey-100);font-size:14px;color:var(--black);vertical-align:middle;}
  .adm-table tr:last-child td{border-bottom:none;}
  .adm-table tr:hover td{background:rgba(198,154,46,.03);}
  .adm-sub{font-size:12.5px;color:var(--grey-500);}

  .badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:999px;}
  .badge-gold{background:rgba(198,154,46,.14);color:var(--mustard-dim);}
  .badge-dark{background:var(--black);color:#fff;}
  .badge-green{background:#e7f5ec;color:#1d7a44;}
  .badge-grey{background:var(--grey-50);color:var(--grey-700);border:1px solid var(--grey-100);}
  .badge-red{background:#fdecea;color:#c0392b;}

  .row-actions{display:flex;gap:6px;flex-wrap:wrap;}
  .ic-btn{border:1px solid var(--grey-100);background:var(--white);border-radius:8px;padding:7px 9px;cursor:pointer;color:var(--grey-700);display:inline-flex;align-items:center;gap:5px;font-size:12px;transition:all .2s ease;}
  .ic-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .ic-btn:hover{border-color:var(--mustard);color:var(--black);}
  .ic-btn.danger:hover{border-color:#c0392b;color:#c0392b;}

  /* switch */
  .sw{width:42px;height:24px;border-radius:999px;background:var(--grey-300);border:none;cursor:pointer;position:relative;transition:background .25s ease;flex-shrink:0;}
  .sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s ease;}
  .sw.on{background:var(--mustard);}
  .sw.on::after{transform:translateX(18px);}

  /* modal */
  .adm-modal{position:fixed;inset:0;z-index:120;display:none;}
  .adm-modal.open{display:block;}
  .adm-modal-bg{position:absolute;inset:0;background:rgba(14,14,13,.6);backdrop-filter:blur(4px);}
  .adm-modal-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(480px,calc(100vw - 32px));max-height:90vh;overflow-y:auto;background:var(--white);border-radius:20px;padding:30px 30px 32px;box-shadow:0 40px 90px rgba(0,0,0,.4);}
  .adm-modal-panel h3{font-family:var(--ff-display);font-weight:700;font-size:21px;color:var(--black);margin-bottom:5px;}
  .adm-modal-panel .msub{font-size:13px;color:var(--grey-700);margin-bottom:20px;}
  .adm-modal-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:9px;border:1px solid var(--grey-100);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .adm-modal-close svg{width:16px;height:16px;stroke:var(--black);fill:none;stroke-width:2;stroke-linecap:round;}

  .adm-note{font-size:12px;color:var(--mustard-dim);background:rgba(198,154,46,.08);border:1px solid rgba(198,154,46,.25);border-radius:11px;padding:12px 14px;margin-bottom:22px;display:flex;gap:9px;align-items:flex-start;}
  .adm-note svg{width:16px;height:16px;stroke:var(--mustard-dim);fill:none;stroke-width:1.8;flex-shrink:0;margin-top:1px;}
  @media(max-width:860px){.adm-shell{grid-template-columns:1fr;}.adm-side{position:relative;height:auto;flex-direction:row;flex-wrap:wrap;}.adm-nav{flex-direction:row;flex-wrap:wrap;}.adm-user{width:100%;border-top:none;}}

  /* requests / analytics / seo extras */
  .adm-seg{display:inline-flex;background:var(--white);border:1px solid var(--grey-100);border-radius:12px;padding:5px;gap:5px;margin-bottom:20px;}
  .adm-seg button{border:none;background:none;font-family:var(--ff-body);font-size:13.5px;color:var(--grey-700);padding:9px 16px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s ease;}
  .adm-seg button.active{background:var(--black);color:#fff;font-weight:600;}
  .adm-pill{font-size:11px;font-weight:700;background:var(--mustard);color:var(--black);border-radius:999px;padding:2px 7px;}
  .adm-seg button.active .adm-pill{background:var(--mustard);}
  .adm-kv{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid var(--grey-100);font-size:14px;}
  .adm-kv b{min-width:120px;color:var(--grey-700);font-weight:600;}
  .adm-kv span{color:var(--black);}
  .adm-kv.col{flex-direction:column;gap:6px;border-bottom:none;}
  .adm-kv.col p{font-size:14px;line-height:1.6;color:var(--grey-700);margin-top:2px;}
  .adm-card-title{font-family:var(--ff-display);font-weight:600;font-size:15px;color:var(--black);margin-bottom:16px;}
  .adm-2col{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;align-items:start;}
  @media(max-width:900px){.adm-2col{grid-template-columns:1fr;}}
  .adm-bar{margin-bottom:15px;}
  .adm-bar:last-child{margin-bottom:0;}
  .adm-bar-top{display:flex;justify-content:space-between;font-size:13px;color:var(--grey-700);margin-bottom:7px;}
  .adm-bar-top b{color:var(--black);}
  .adm-bar-track{height:8px;border-radius:999px;background:var(--grey-50);overflow:hidden;}
  .adm-bar-track span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--mustard),var(--mustard-light));}
  .adm-score{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .adm-score-track{flex:1;height:10px;border-radius:999px;background:var(--grey-50);overflow:hidden;}
  .adm-score-track span{display:block;height:100%;background:linear-gradient(90deg,var(--mustard),var(--mustard-light));}
  .adm-score b{font-family:var(--ff-display);font-size:16px;color:var(--black);}
  .adm-check{display:flex;align-items:center;gap:11px;padding:9px 0;font-size:13.5px;color:var(--black);}
  .adm-tick{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--grey-300);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s ease;}
  .adm-tick.on{background:var(--mustard);border-color:var(--mustard);}
  .adm-tick svg{width:14px;height:14px;stroke:var(--black);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .adm-seo-tools{display:flex;flex-wrap:wrap;gap:11px;margin:18px 0 26px;}
  .adm-seo-tools .adm-btn{font-size:13px;}

</style>

let _checking=false, _entered=false;
async function checkSession(){
  if(_checking) return; _checking=true;
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ _entered=false; document.body.classList.remove('authed'); return; }
    if(_entered) return;                 /* уже внутри — не перезапускаем и не сбрасываем экран */
    const email=(session.user.email||'').toLowerCase();
    let role=null;
    let name=(session.user.user_metadata && session.user.user_metadata.full_name) || email;
    try{ const r=await sb.rpc('site_admin_role'); if(!r.error) role=r.data; }catch(_){}
    if(!role){
      const err=document.getElementById('lgErr');
      if(err){ err.textContent='Почта '+email+' не в списке администраторов. Обратитесь к главному администратору.'; err.style.display='block'; }
      _entered=false; document.body.classList.remove('authed');
      await sb.auth.signOut();
      return;
    }
    try{ const me=await sb.from('site_admins').select('name').eq('email',email).maybeSingle();
         if(me.data && me.data.name) name=me.data.name; }catch(_){}
    current={ email:email, role:role, name:name };
    await loadAllData();
    _entered=true;
    enterApp();
  } finally { _checking=false; }
}
sb.auth.onAuthStateChange((event)=>{
  if(event==='SIGNED_OUT'){ _entered=false; current=null; document.body.classList.remove('authed'); return; }
  if(!_entered) checkSession();
});
checkSession();

async function loadAllData(){

      sb.from('site_materials').select('*').order('sort',{ascending:true}).order('created_at',{ascending:false}),
      sb.from('seo_pages').select('*').order('id',{ascending:true}),
      sb.from('site_admins').select('*').order('created_at',{ascending:true}),
      sb.from('vacancies').select('id,title,description,location,type,budget,requirements,offer,status,show_on_site').order('created_at',{ascending:false}),
      sb.from('candidates').select('id,position,salary,public_field,public_city,public_experience,public_results,public_summary,public_languages,public_skills,is_public,created_at').order('created_at',{ascending:false})
    ]);
    if(mat.data) MAT=mat.data.map(m=>({ id:m.id, cat:CAT_RU[m.cat]||'Статья', title:m.title||'', desc:m.description||'', body:m.body||'', disabled:!m.published }));
    if(seo.data) SEO=seo.data.map(x=>({ id:x.id, page:x.page||'', url:x.url||'', title:x.title||'', desc:x.description||'', keywords:x.keywords||'', indexed:!!x.indexed }));
    if(adm.data) EMP=adm.data.map(a=>({ id:a.id, name:a.name||a.email, email:a.email, role:a.role, status:a.status, added:fmtDate(a.created_at) }));
    if(vac.data) VAC=vac.data.map(v=>({ id:v.id, field:(v.status||'—'), title:v.title||'', company:v.description||'', city:v.location||'', salary:v.budget?(Number(v.budget).toLocaleString('ru-RU')+' $'):'', type:v.type||'', disabled:!v.show_on_site, responsibilities:[], requirements:String(v.requirements||'').split('\n').filter(Boolean), offer:String(v.offer||'').split('\n').filter(Boolean) }));
    if(cand.data) CAND=cand.data.map(c=>({ id:c.id, field:c.public_field||c.position||'—', city:c.public_city||'', date:fmtDate(c.created_at), experience:c.public_experience||'', results:c.public_results||'', salary:c.salary?('от '+Number(c.salary).toLocaleString('ru-RU')+' $'):'', languages:c.public_languages||'', skills:c.public_skills||[], description:c.public_summary||'', disabled:!c.is_public }));

}

async function sendInvite(emp){
  try{
    const { error } = await sb.from('site_admins').insert({ email:(emp.email||'').toLowerCase(), name:emp.name, role:emp.role, status:'active', added_by:(current&&current.email)||null });
    if(error) throw error;
    await loadAllData(); renderEmployees();
    toast('Администратор добавлен. Он сможет войти через Google этой почтой.');
  }catch(e){ console.error('addAdmin',e); toast('Не удалось добавить администратора: '+(e.message||e)); }
}

  const stat=(ic,n,l)=>'<div class="adm-stat"><div class="ic">'+ic+'</div><div class="num">'+n+'</div><div class="lbl">'+l+'</div></div>';
  const I={eye:'<svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>',
    usr:'<svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>',
    msg:'<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>',
    doc:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>',
    pct:'<svg viewBox="0 0 24 24"><path d="M19 5L5 19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>'};
  const tiles = stat(I.eye, A.views.toLocaleString('ru-RU'),'Просмотров за месяц')
    + stat(I.usr, A.visitors.toLocaleString('ru-RU'),'Уникальных посетителей')
    + stat(I.msg, A.leads_month,'Заявок от заказчиков')
    + stat(I.doc, A.apps_month,'Откликов кандидатов')
    + stat(I.pct, A.conversion,'Конверсия в заявку');
  // bar chart (inline SVG)
  const maxV=Math.max(...A.series.map(s=>s.v));
  const bw=46, gap=22, h=180, pad=8;
  const bars=A.series.map((s,i)=>{ const bh=Math.round((s.v/maxV)*(h-30)); const x=i*(bw+gap)+pad; const y=h-bh-18;

  const chartW=A.series.length*(bw+gap)+pad;
  const chart='<div class="adm-card" style="padding:22px 24px;margin-bottom:22px"><div class="adm-card-title">Просмотры за неделю</div>'
    +'<div style="overflow-x:auto"><svg viewBox="0 0 '+chartW+' '+h+'" style="width:100%;max-width:'+chartW+'px;height:200px">'+bars+'</svg></div></div>';

    + A.top_pages.map(p=>'<tr><td><b>'+esc(p.page)+'</b></td><td>'+p.views.toLocaleString('ru-RU')+'</td><td class="adm-sub">'+esc(p.avg)+'</td></tr>').join('')
    + '</tbody></table></div></div>';
  // sources
  const src='<div class="adm-card" style="padding:20px 22px"><div class="adm-card-title">Источники трафика</div>'
    + A.sources.map(s=>'<div class="adm-bar"><div class="adm-bar-top"><span>'+esc(s.s)+'</span><b>'+s.p+'%</b></div><div class="adm-bar-track"><span style="width:'+s.p+'%"></span></div></div>').join('')
    + '</div>';
  main.innerHTML = head('Аналитика','Метрики сайта: просмотры, посетители, источники и заявки. Подключается к Google Analytics и Search Console.')
    + '<div class="adm-note"><svg viewBox="0 0 24 24"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/></svg><div>Показаны демо-данные. После подключения GA4 / Search Console здесь будут реальные цифры в реальном времени.</div></div>'
    + '<div class="adm-stats">'+tiles+'</div>'
    + chart
    + '<div class="adm-2col">'+tp+src+'</div>';
}

/* ===== Реальное сохранение в Supabase ===== */
async function pushCRM(action,item){
  try{
    if(action==='material.create'){
      const r=await sb.from('site_materials').insert({ cat:CAT_EN[item.cat]||'article', title:item.title, description:item.desc, body:item.body, published:!item.disabled, created_by:(current&&current.email)||null }).select('id').single();
      if(r.error) throw r.error; item.id=r.data.id; renderMaterials();
    } else if(action==='material.update'){
      const r=await sb.from('site_materials').update({ cat:CAT_EN[item.cat]||'article', title:item.title, description:item.desc, body:item.body, updated_at:new Date().toISOString() }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='materials.toggle'){
      const r=await sb.from('site_materials').update({ published:!item.disabled }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='materials.delete'){
      const r=await sb.from('site_materials').delete().eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='seo.update'){
      const r=await sb.from('seo_pages').update({ title:item.title, description:item.desc, keywords:item.keywords, updated_by:(current&&current.email)||null, updated_at:new Date().toISOString() }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='seo.index'){
      const r=await sb.from('seo_pages').update({ indexed:!!item.indexed }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='employee.update'){
      const r=await sb.from('site_admins').update({ name:item.name, email:(item.email||'').toLowerCase(), role:item.role }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='employee.toggle'){
      const r=await sb.from('site_admins').update({ status:item.status }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='employee.delete'){
      const r=await sb.from('site_admins').delete().eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='vacancies.toggle'){
      const r=await sb.from('vacancies').update({ show_on_site:!item.disabled }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='vacancy.update'){
      const r=await sb.from('vacancies').update({ title:item.title, description:item.company, location:item.city, type:item.type, budget:numOnly(item.salary), requirements:(item.requirements||[]).join('\n'), offer:(item.offer||[]).join('\n') }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='vacancy.create'){
      const r=await sb.from('vacancies').insert({ title:item.title, description:item.company, location:item.city, type:item.type, budget:numOnly(item.salary), requirements:(item.requirements||[]).join('\n'), offer:(item.offer||[]).join('\n'), show_on_site:true, status:'Открыта' }).select('id').single();
      if(r.error) throw r.error; item.id=r.data.id; renderVacancies();
    } else if(action==='vacancies.delete'){
      const r=await sb.from('vacancies').update({ show_on_site:false }).eq('id',item.id); if(r.error) throw r.error;
      toast('Вакансия скрыта на сайте. Полное удаление — в ATS.'); await loadAllData(); go('vacancies');
    } else if(action==='candidates.toggle'){
      const r=await sb.from('candidates').update({ is_public:!item.disabled }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='candidate.update'){
      const r=await sb.from('candidates').update({ public_field:item.field, public_city:item.city, public_experience:item.experience, public_results:item.results, public_summary:item.description, public_languages:item.languages, public_skills:item.skills||[] }).eq('id',item.id); if(r.error) throw r.error;
    } else if(action==='candidate.create' || action==='candidates.delete'){
      toast('Карточки кандидатов создаются и удаляются в ATS (персональные данные).');
      await loadAllData(); go('candidates'); return;
    }
    // customer.*, leads.*, apps.*, seo.tool, seo.check — демонстрационные разделы (для них нет таблиц), не сохраняются
  }catch(e){ console.error('save',action,e); toast('Ошибка сохранения: '+(e.message||e)); await loadAllData(); }
}
</script>
</body>
</html>
